<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECHON – Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0A1628;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(30,111,217,.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: #112240;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 20px;
    padding: 1.5rem 2.5rem 2.5rem 2.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 32px 80px rgba(0,0,0,.4);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    margin-top: 10px;
    display: flex;
    justify-content: center;
  }
  .logo span { color: #1E6FD9; }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00C7BE;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  .subtitle {
    color: rgba(255,255,255,.4);
    font-size: .88rem;
    margin-bottom: 2rem;
  }

  label {
    display: block;
    font-size: .8rem;
    color: rgba(255,255,255,.5);
    margin-bottom: .4rem;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px;
    padding: .75rem 1rem;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    margin-bottom: 1.25rem;
    transition: border-color .2s;
    outline: none;
  }
  input:focus { border-color: #1E6FD9; }
  input::placeholder { color: rgba(255,255,255,.2); }

  .btn-login {
    width: 100%;
    background: #1E6FD9;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s, transform .15s;
    margin-top: .25rem;
  }
  .btn-login:hover { background: #1a5fc5; transform: translateY(-1px); }
  .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .erro {
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.3);
    color: #f87171;
    border-radius: 8px;
    padding: .75rem 1rem;
    font-size: .85rem;
    margin-bottom: 1rem;
    display: none;
  }

  .sucesso {
    background: rgba(34,197,94,.1);
    border: 1px solid rgba(34,197,94,.3);
    color: #4ade80;
    border-radius: 8px;
    padding: .75rem 1rem;
    font-size: .85rem;
    margin-bottom: 1rem;
    display: none;
  }

  .footer-txt {
    text-align: center;
    margin-top: 1.5rem;
    color: rgba(255,255,255,.2);
    font-size: .78rem;
  }

  .logo-img {
    max-width: 130px;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ADMIN PANEL ── */
  .admin-section-title {
    font-size: .72rem;
    color: rgba(255,255,255,.35);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: .75rem;
    margin-top: 1.25rem;
    padding-bottom: .4rem;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .admin-section-title:first-child { margin-top: 0; }
  .token-gerado {
    background: rgba(0,199,190,.08);
    border: 1px solid rgba(0,199,190,.2);
    border-radius: 8px;
    padding: .6rem .9rem;
    font-size: .78rem;
    color: #00C7BE;
    margin-bottom: 1rem;
    display: none;
    word-break: break-all;
  }
  .token-gerado span { font-weight: 600; }
  .admin-link {
    color: rgba(255,255,255,.08);
    font-size: .7rem;
    cursor: pointer;
    text-decoration: none;
    transition: color .3s;
    user-select: none;
  }
  .admin-link:hover { color: rgba(255,255,255,.25); }
</style>
</head>
<body>
<div class="card">
  <div class="logo" style="justify-content: center;">
    <img src="Logo_W.png" class="logo-img">
  </div>

  <!-- LOGIN -->
  <div id="tab-login">
    <p class="subtitle">Olá, bem vindo de volta! Digite as credenciais e acesse o painel de informações da sua empresa.</p>
    <div class="erro" id="erroMsg"></div>
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" />
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" />
    <button class="btn-login" id="btnLogin" onclick="login()">Entrar</button>
  </div>

  <!-- ADMIN (oculto) -->
  <div id="tab-admin" style="display:none">
    <div id="admin-lock">
      <p class="subtitle">Área restrita.</p>
      <div class="erro" id="erroAdmin"></div>
      <label>Senha de administrador</label>
      <input type="password" id="senhaAdmin" placeholder="••••••••" />
      <button class="btn-login" onclick="desbloquearAdmin()">Continuar</button>
    </div>
    <div id="admin-panel" style="display:none">
      <div class="sucesso" id="sucessoAdmin"></div>
      <div class="erro" id="erroAdminForm"></div>
      <div class="admin-section-title">Novo Cliente</div>
      <label>Nome da empresa</label>
      <input type="text" id="adm-nome" placeholder="Ex: Cinemark" />
      <label>E-mail de acesso</label>
      <input type="email" id="adm-email" placeholder="cliente@empresa.com" />
      <label>Senha de acesso</label>
      <input type="password" id="adm-senha" placeholder="Senha do cliente" />
      <div class="admin-section-title">Dispositivo / Sensor</div>
      <label>Nome do sensor</label>
      <input type="text" id="adm-disp-nome" placeholder="Ex: Sensor Sala 1" />
      <label>Local de instalação</label>
      <input type="text" id="adm-disp-local" placeholder="Ex: Corredor principal" />
      <div class="token-gerado" id="tokenGerado">Token do sensor: <span id="tokenValor"></span></div>
      <button class="btn-login" id="btnCadastrar" onclick="cadastrarCliente()">Cadastrar cliente e sensor</button>
      <button style="width:100%;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);border-radius:10px;padding:.6rem;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;margin-top:.75rem;transition:background .2s" onclick="sairAdmin()">Sair do modo admin</button>
    </div>
  </div>

  <p class="footer-txt">© 2026 ECHON - Sonara &nbsp;·&nbsp; <span class="admin-link" onclick="toggleAdmin()">v1.0</span></p>
</div>

<script>
  const API = 'http://localhost:3000';
  const ADMIN_EMAIL = 'adm@echon.app';
  const ADMIN_SENHA = 'YxTLA8jJxwpv3Ux';

  // ── TOGGLE ADMIN ──
  let adminVisivel = false;
  function toggleAdmin() {
    adminVisivel = !adminVisivel;
    document.getElementById('tab-login').style.display = adminVisivel ? 'none' : 'block';
    document.getElementById('tab-admin').style.display = adminVisivel ? 'block' : 'none';
  }

  // ── LOGIN CLIENTE ──
  async function login() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value.trim();
    const btn = document.getElementById('btnLogin');
    const erro = document.getElementById('erroMsg');

    if (!email || !senha) { mostrarErro('erroMsg', 'Preencha e-mail e senha.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Entrando...';
    erro.style.display = 'none';

    try {
      const res = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });

      const data = await res.json();
      console.log('Resposta da API:', data);

      if (!res.ok) {
        mostrarErro('erroMsg', data.erro || 'Erro ao fazer login.');
        btn.disabled = false;
        btn.innerHTML = 'Entrar';
        return;
      }

      localStorage.setItem('echon_token', data.token);
      localStorage.setItem('echon_cliente', JSON.stringify(data.cliente));
      window.location.replace('dashboard.html');

    } catch (e) {
      mostrarErro('erroMsg', 'Não foi possível conectar ao servidor.');
      btn.disabled = false;
      btn.innerHTML = 'Entrar';
    }
  }

  // ── ADMIN: DESBLOQUEAR ──
  function desbloquearAdmin() {
    const senha = document.getElementById('senhaAdmin').value.trim();
    if (senha !== ADMIN_SENHA) {
      mostrarErro('erroAdmin', 'Senha incorreta.');
      return;
    }
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
  }

  function sairAdmin() {
    document.getElementById('admin-lock').style.display = 'block';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('senhaAdmin').value = '';
  }

  // ── ADMIN: CADASTRAR CLIENTE + DISPOSITIVO ──
  async function cadastrarCliente() {
    const nome = document.getElementById('adm-nome').value.trim();
    const email = document.getElementById('adm-email').value.trim();
    const senha = document.getElementById('adm-senha').value.trim();
    const dispNome = document.getElementById('adm-disp-nome').value.trim();
    const dispLocal = document.getElementById('adm-disp-local').value.trim();
    const btn = document.getElementById('btnCadastrar');

    if (!nome || !email || !senha || !dispNome || !dispLocal) {
      mostrarErro('erroAdminForm', 'Preencha todos os campos.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Cadastrando...';
    document.getElementById('erroAdminForm').style.display = 'none';
    document.getElementById('sucessoAdmin').style.display = 'none';
    document.getElementById('tokenGerado').style.display = 'none';

    try {
      const res = await fetch(`${API}/api/admin/cadastrar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha, dispNome, dispLocal, adminSenha: ADMIN_SENHA })
      });

      const data = await res.json();

      if (!res.ok) {
        mostrarErro('erroAdminForm', data.erro || 'Erro ao cadastrar.');
        btn.disabled = false;
        btn.innerHTML = 'Cadastrar cliente e sensor';
        return;
      }

      // Mostra token gerado
      document.getElementById('tokenValor').textContent = data.token;
      document.getElementById('tokenGerado').style.display = 'block';

      // Mostra sucesso
      const s = document.getElementById('sucessoAdmin');
      s.textContent = `✓ Cliente "${nome}" cadastrado com sucesso!`;
      s.style.display = 'block';

      // Limpa campos
      ['adm-nome','adm-email','adm-senha','adm-disp-nome','adm-disp-local'].forEach(id => {
        document.getElementById(id).value = '';
      });

      btn.disabled = false;
      btn.innerHTML = 'Cadastrar cliente e sensor';

    } catch (e) {
      mostrarErro('erroAdminForm', 'Não foi possível conectar ao servidor.');
      btn.disabled = false;
      btn.innerHTML = 'Cadastrar cliente e sensor';
    }
  }

  // ── HELPERS ──
  function mostrarErro(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
